name: ColdSymptomTracker
options:
  bundleIdPrefix: com.shimondeitel.coldtracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ColdSymptomTracker:
    type: application
    platform: iOS
    sources:
      - path: ColdSymptomTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldtracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ColdSymptomTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ColdSymptomTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColdSymptomTrackerTests
      - path: ColdSymptomTracker.storekit
    dependencies:
      - target: ColdSymptomTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldtracker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ColdSymptomTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ColdSymptomTrackerUITests
    dependencies:
      - target: ColdSymptomTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldtracker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ColdSymptomTracker:
    build:
      targets:
        ColdSymptomTracker: all
        ColdSymptomTrackerTests: [test]
        ColdSymptomTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ColdSymptomTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: ColdSymptomTracker.storekit
      targets:
        - ColdSymptomTrackerTests
        - ColdSymptomTrackerUITests
    archive:
      config: Release
